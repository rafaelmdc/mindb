services:
  web:
    build:
      context: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "1"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      TAXONOMY_DB_PATH: /taxonomy-data/ncbi_taxonomy.sqlite
      TAXONOMY_CACHE_DB_PATH: /app/.taxonomy_cache.sqlite
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../taxonbridge/data:/taxonomy-data:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
