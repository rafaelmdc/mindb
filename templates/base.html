<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Innov Health Microbiome{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'core:home' %}">Microbiome DB</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{% url 'core:home' %}">Home</a>
          <a class="nav-link" href="{% url 'database:browser-home' %}">Browser</a>
          <a class="nav-link" href="{% url 'database:study-list' %}">Studies</a>
          <a class="nav-link" href="{% url 'database:sample-list' %}">Samples</a>
          <a class="nav-link" href="{% url 'database:organism-list' %}">Organisms</a>
          <a class="nav-link" href="{% url 'database:relativeassociation-list' %}">Associations</a>
          <a class="nav-link" href="{% url 'core:graph' %}">Graph</a>
          <a class="nav-link" href="{% url 'imports:upload' %}">Imports</a>
          <a class="nav-link" href="{% url 'admin:index' %}">Admin</a>
        </div>
      </div>
    </nav>

    <main class="py-4">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
